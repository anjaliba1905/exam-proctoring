services:
  - type: web
    name: ai-exam-proctoring-api
    runtime: docker
    dockerfilePath: server/Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: TEACHER_USERNAME
        value: admin
      - key: TEACHER_PASSWORD
        value: admin123
      - key: DATABASE_URL
        sync: false
      - key: JWT_EXPIRE_HOURS
        value: "9"
      - key: SQLITE_PATH
        value: /app/data/violations.db
